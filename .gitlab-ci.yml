make-alma10-apptainer-image:
  tags:
    - gentoo
  stage: build
  dependencies: []
  before_script:
    - echo $KERBEROS_PASSWORD | kinit ${KERBEROS_USER}@CERN.CH
  script:
    - sudo apptainer build --build-arg project_dir="$CI_PROJECT_DIR" adaptyst-alma10.sif $CI_PROJECT_DIR/apptainer-alma.def
    - |
      if [[ "$CI_COMMIT_TAG" != "" ]]; then
        xrdcp -C auto --rm-bad-cksum -t 5 adaptyst-alma10.sif root://eosuser.cern.ch/$WEB_STORAGE/apptainer/adaptyst-alma10-$CI_COMMIT_TAG.sif
      fi
  after_script:
    - rm -f adaptyst-alma10.sif
    - kdestroy -A

doxygen-test:
  image:
    name: registry.cern.ch/docker.io/ubuntu:latest
  stage: test
  dependencies: []
  before_script:
    - apt-get update
    - apt-get install -y doxygen
  script:
    - cd docs
    - doxygen Doxyfile
  artifacts:
    paths:
      - docs/html
    expire_in: 6 h

doxygen-deploy:
  stage: deploy
  dependencies:
    - doxygen-test
  image: gitlab-registry.cern.ch/ci-tools/ci-web-deployer:latest
  rules:
    - if: $CI_COMMIT_TAG != null
  script:
    - mv docs/html public
    - deploy-eos